<!DOCTYPE html>
<html>

<head>

<title>Reset Password</title>

<style>

body{
    background:#05070d;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:400px;
    background:#0d111b;
    border:1px solid #d4af37;
    padding:40px;
    border-radius:10px;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#1a1f2d;
    border:none;
    border-radius:8px;
    color:white;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#d4af37;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h1>Reset Password</h1>

<form action="ResetPasswordServlet"
      method="POST">

<input type="hidden"
       name="token"
       id="token">

<input type="password"
       name="password"
       placeholder="New Password"
       required>

<button type="submit">
Reset Password
</button>

</form>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

//document.getElementById("email").value =
//params.get("email");
document.getElementById("token").value =
params.get("token");
</script>

</body>
</html>
