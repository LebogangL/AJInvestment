<!DOCTYPE html>
<html>

<head>

<title>Forgot Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05070d;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:500px;
    background:#0d111b;
    border:1px solid #d4af37;
    border-radius:12px;
    padding:40px;
}

h1{
    color:#d4af37;
    text-align:center;
    margin-bottom:40px;
    font-size:50px;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:8px;
    background:#dfe6f3;
    font-size:20px;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:8px;
    background:#d4af37;
    color:black;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    pointer-events:auto;
    position:relative;
    z-index:9999;
}

button:hover{
    background:#f1c75b;
}

.text{
    text-align:center;
    margin-top:30px;
    color:#d4af37;
    font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Forgot Password</h1>

<form action="ForgotPasswordServlet"
      method="POST">

<input type="email"
       name="email"
       placeholder="Enter your email"
       required>

<button type="submit">
Recover Password
</button>

</form>

<div class="text">
Enter your registered email
</div>

</div>

</body>
</html>
